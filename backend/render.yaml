services:
  - type: web
    name: decision-anchor-api
    env: python
    region: singapore
    plan: free
    pythonVersion: "3.12.0"
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_DIR
        value: /tmp/da_data
